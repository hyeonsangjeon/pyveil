name: Tests

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Typecheck
        run: python -m mypy pyveil tests

      - name: Run synthetic detector evaluation
        run: python evaluation/evaluate.py --check

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest
