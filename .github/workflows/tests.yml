name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Typecheck
        run: python -m mypy pyveil tests

      - name: Run synthetic detector evaluation
        run: python evaluation/evaluate.py --check

      - name: Verify zero-dependency core
        run: python scripts/verify_zero_dependencies.py

      - name: Validate compatibility manifest and docs
        run: python scripts/validate_compatibility.py --check

      - name: Verify Proof-of-Compatibility Receipt
        run: python scripts/compatibility_receipt.py --check

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

  provider-contract:
    name: Provider contracts / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install provider SDKs and test dependencies
        run: python -m pip install -e ".[openai,anthropic,test]"

      - name: Run offline provider contract tests
        run: python -m pytest tests/test_provider_contracts.py -m provider_contract --no-cov
