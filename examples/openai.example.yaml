# Non-secret OpenAI and pyveil settings.
# Environment variables override every value below.
openai:
  model: gpt-5.6-luna
  max_output_tokens: 256
  timeout_seconds: 120
  api_key_env: OPENAI_API_KEY
  # base_url: https://api.openai.com/v1

pyveil:
  secret_env: PYVEIL_SECRET
  scope: tenant-123/openai
